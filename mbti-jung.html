var currentQ = 0;
var answers = {};
var scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

function startTest() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('testScreen').classList.remove('hidden');
    showQuestion(0);
}

function showQuestion(idx) {
    var q = questions[idx];
    var qText = q.a.text;
    var optAText = q.a.optA;
    var optBText = q.a.optB;
    var selected = answers[idx];

    var html = '<div class="bg-white rounded-2xl p-8 shadow-lg">';
    html += '<h2 class="text-xl font-semibold text-gray-800 mb-8 text-center">' + (idx+1) + '. ' + qText + '</h2>';
    html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';

    html += '<div class="option-card p-5 border-2 rounded-xl ' + (selected==='A'?'selected border-purple-500':'border-gray-200') + '" onclick="selectAnswer(\'A\')">';
    html += '<div class="flex items-center"><div class="w-8 h-8 rounded-full border-2 ' + (selected==='A'?'bg-purple-500 border-purple-500':'border-gray-300') + ' flex items-center justify-center text-white font-bold mr-4">' + (selected==='A'?'✓':'') + '</div>';
    html += '<div class="text-gray-700 font-medium">' + optAText + '</div></div></div>';

    html += '<div class="option-card p-5 border-2 rounded-xl ' + (selected==='B'?'selected border-purple-500':'border-gray-200') + '" onclick="selectAnswer(\'B\')">';
    html += '<div class="flex items-center"><div class="w-8 h-8 rounded-full border-2 ' + (selected==='B'?'bg-purple-500 border-purple-500':'border-gray-300') + ' flex items-center justify-center text-white font-bold mr-4">' + (selected==='B'?'✓':'') + '</div>';
    html += '<div class="text-gray-700 font-medium">' + optBText + '</div></div></div>';

    html += '</div></div>';

    document.getElementById('questionContainer').innerHTML = html;
    document.getElementById('currentQ').textContent = idx + 1;
    document.getElementById('progressPct').textContent = Math.round((idx / 52) * 100);
    document.getElementById('progressBar').style.width = (idx / 52 * 100) + '%';

    document.getElementById('prevBtn').classList.toggle('hidden', idx === 0);
    document.getElementById('nextBtn').classList.toggle('hidden', idx === 51);
    document.getElementById('submitBtn').classList.toggle('hidden', idx < 51);
}

function selectAnswer(choice) {
    answers[currentQ] = choice;
    var q = questions[currentQ];
    if (currentQ < 14) {
        if (choice === 'A') { scores.E += q.a.valA; scores.I += q.a.valB; }
        else { scores.E += q.a.valB; scores.I += q.a.valA; }
    } else if (currentQ < 27) {
        if (choice === 'A') { scores.S += q.a.valA; scores.N += q.a.valB; }
        else { scores.S += q.a.valB; scores.N += q.a.valA; }
    } else if (currentQ < 40) {
        if (choice === 'A') { scores.T += q.a.valA; scores.F += q.a.valB; }
        else { scores.T += q.a.valB; scores.F += q.a.valA; }
    } else {
        if (choice === 'A') { scores.J += q.a.valA; scores.P += q.a.valB; }
        else { scores.J += q.a.valB; scores.P += q.a.valA; }
    }
    showQuestion(currentQ);
}

function nextQuestion() {
    if (answers[currentQ] === undefined) {
        alert('请选择一个选项');
        return;
    }
    currentQ++;
    showQuestion(currentQ);
}

function prevQuestion() {
    if (currentQ > 0) {
        currentQ--;
        showQuestion(currentQ);
    }
}

function submitTest() {
    if (answers[currentQ] === undefined) {
        alert('请选择一个选项');
        return;
    }
    showResults();
}

function showResults() {
    document.getElementById('testScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');

    var type = (scores.E >= scores.I ? 'E' : 'I') + (scores.S >= scores.N ? 'S' : 'N') + (scores.T >= scores.F ? 'T' : 'F') + (scores.J >= scores.P ? 'J' : 'P');
    var info = typeInfo[type];

    document.getElementById('resultType').textContent = type;
    document.getElementById('resultName').textContent = info.name + ' (' + type + ')';
    document.getElementById('resultSubtitle').textContent = info.function;

    var dims = [
        {key:'外向型',score:scores.E,other:scores.I,sym:'E',color:'bg-blue-500'},
        {key:'内向型',score:scores.I,other:scores.E,sym:'I',color:'bg-indigo-500'},
        {key:'感觉型',score:scores.S,other:scores.N,sym:'S',color:'bg-green-500'},
        {key:'直觉型',score:scores.N,other:scores.S,sym:'N',color:'bg-emerald-500'},
        {key:'思考型',score:scores.T,other:scores.F,sym:'T',color:'bg-orange-500'},
        {key:'情感型',score:scores.F,other:scores.T,sym:'F',color:'bg-red-500'},
        {key:'判断型',score:scores.J,other:scores.P,sym:'J',color:'bg-purple-500'},
        {key:'知觉型',score:scores.P,other:scores.J,sym:'P',color:'bg-pink-500'}
    ];

    var cardsHTML = '';
    dims.forEach(function(d) {
        var pct = Math.round((d.score / (d.score + d.other)) * 100);
        cardsHTML += '<div class="result-card bg-white rounded-xl p-4 shadow-sm border border-gray-100">';
        cardsHTML += '<div class="flex justify-between items-center mb-2"><span class="text-sm font-semibold text-gray-700">' + d.key + '</span><span class="text-lg font-bold ' + d.color.replace('bg-','text-') + '">' + d.sym + '</span></div>';
        cardsHTML += '<div class="w-full bg-gray-200 rounded-full h-2"><div class="' + d.color + ' h-2 rounded-full" style="width:' + pct + '%"></div></div>';
        cardsHTML += '<div class="text-xs text-gray-400 mt-1">' + d.score + ' vs ' + d.other + '</div></div>';
    });
    document.getElementById('resultCards').innerHTML = cardsHTML;

    var funcHTML = '<h3 class="text-xl font-bold text-gray-800 mb-4">🧩 功能层级分析</h3>';
    funcHTML += '<div class="bg-gradient-to-r from-purple-50 to-pink-50 rounded-xl p-5 mb-4">';
    funcHTML += '<div class="font-semibold text-purple-700 mb-2">你的类型功能层级</div>';
    funcHTML += '<div class="text-2xl font-bold text-purple-600 mb-1">' + type + '</div>';
    funcHTML += '<div class="text-sm text-gray-600">' + info.function + '</div></div>';
    funcHTML += '<p class="text-gray-600 text-sm">' + info.function + '。在荣格类型理论中，每种类型都有四个心理功能的有序层级。主宰功能最为发达，而劣势功能则仍在整个人生中持续发展。</p>';
    document.getElementById('functionResults').innerHTML = funcHTML;

    var typeDesc = document.getElementById('typeDescription');
    typeDesc.innerHTML = '<h3 class="text-xl font-bold text-gray-800 mb-4">🧠 荣格类型分析</h3><p class="text-gray-600 leading-relaxed mb-4">' + info.desc + '</p><div class="bg-purple-50 rounded-xl p-4"><div class="font-semibold text-purple-700 mb-2">关键特征</div><ul class="text-sm text-gray-600 space-y-1"><li>态度类型：' + (type[0]==='E'?'外向型（关注外部世界）':'内向型（关注内心世界）') + '</li><li>感知方式：' + (type[1]==='S'?'感觉型（务实、此时此地）':'直觉型（直觉、可能性）') + '</li><li>判断方式：' + (type[2]==='T'?'思考型（逻辑、分析）':'情感型（价值导向、同理心）') + '</li><li>生活方式：' + (type[3]==='J'?'判断型（有结构、有计划）':'知觉型（灵活、随性）') + '</li></ul></div>';

    var jungHTML = '';
    jungHTML += '<h3 class="text-xl font-bold text-gray-800 mb-4">📚 关于荣格心理类型</h3>';
    jungHTML += '<p class="text-gray-600 text-sm mb-3">卡尔·荣格（1875-1961）是瑞士精神科医生，发展了心理类型理论。在1921年的著作《心理类型》中，他提出人类通过四种心理功能体验世界：感觉、直觉、思考和情感。</p>';
    jungHTML += '<p class="text-gray-600 text-sm">荣格还确定了两种态度类型：外向型（能量向外）和内向型（能量向内）。态度类型与功能类型的结合产生了16种心理类型，这也成为MBTI的基础。</p>';
    document.getElementById('jungExplanation').innerHTML = jungHTML;

    window.scrollTo({top:0,behavior:'smooth'});
}

function retakeTest() {
    currentQ = 0;
    answers = {};
    scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
    window.scrollTo({top:0,behavior:'smooth'});
}
</script>

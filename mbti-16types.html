    ISTJ:{name:"物流师",desc:"ISTJ是可靠务实的人，注重责任和承诺。他们做事有条理、负责任，是值得信赖的支柱。传统、诚实、有原则。",strengths:["可靠性","责任感","务实","有组织","诚信正直"],careers:["会计","法律","管理","行政","金融"]},
    ISFJ:{name:"守卫者",desc:"ISFJ是忠诚温暖的守护者，慷慨、体贴、注重细节。他们默默奉献，是朋友和家人坚实的后盾。富有责任感和同情心。",strengths:["忠诚可靠","体贴温暖","责任感强","注重细节","乐于助人"],careers:["护理","行政","人力资源","社会工作","教育"]},
    ESTJ:{name:"总经理",desc:"ESTJ是务实的组织者，注重效率和成果。他们善于管理事务和人员，决策果断、执行力强，是传统价值观的守护者。",strengths:["组织能力强","执行力强","决策果断","责任感强","传统可靠"],careers:["企业管理","行政管理","法律","执法","金融"]},
    ESFJ:{name:"执政官",desc:"ESFJ是热心的组织者，友好、善于社交、乐于助人。他们注重和谐的人际关系，是受欢迎的氛围制造者和关怀者。",strengths:["社交能力强","善于照顾他人","热情友好","有责任感","善于协调"],careers:["人力资源","销售","护理","教育","客户服务"]},
    ISTP:{name:"鉴赏家",desc:"ISTP是务实的行动者，冷静、理性、善于分析。他们喜欢探索事物的运作原理，动手能力强，是天生的工匠和解决者。",strengths:["动手能力强","分析能力强","冷静理性","适应力强","实用主义"],careers:["工程","机械","信息技术","执法","体育"]},
    ISFP:{name:"探险家",desc:"ISFP是自由的艺术家，温柔、敏感、富有审美。他们活在当下，追求真实和美，是热情的探险家和创意表达者。",strengths:["艺术气质","敏感细腻","适应力强","观察力强","善于表达"],careers:["艺术设计","摄影","音乐","时尚","手工艺"]},
    ESTP:{name:"企业家",desc:"ESTP是充满活力的行动者，大胆、灵活、善于社交。他们喜欢挑战和刺激，是天生的谈判者和机会捕捉者。",strengths:["行动力强","社交能力强","灵活变通","大胆果断","务实"],careers:["创业","销售","金融","房地产","演艺"]},
    ESFP:{name:"表演者",desc:"ESFP是热情的表演者，友好、外向、热爱生活。他们喜欢成为焦点，带给他人快乐，是天生的娱乐者和氛围制造者。",strengths:["热情洋溢","社交能力强","有感染力","活在当下","多才多艺"],careers:["表演艺术","销售","旅游","活动策划","娱乐产业"]}
};

var currentQ = 0;
var answers = {};
var scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

function startTest() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('testScreen').classList.remove('hidden');
    showQuestion(0);
}

function showQuestion(idx) {
    var q = questions[idx];
    var qText = q.a.text;
    var optAText = q.a.optA;
    var optBText = q.a.optB;
    var selected = answers[idx];

    var html = '<div class="bg-white rounded-2xl p-8 shadow-lg">';
    html += '<h2 class="text-xl font-semibold text-gray-800 mb-8 text-center">' + (idx+1) + '. ' + qText + '</h2>';
    html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';

    html += '<div class="option-card p-5 border-2 rounded-xl ' + (selected==='A'?'selected border-blue-500':'border-gray-200') + '" onclick="selectAnswer(\'A\')">';
    html += '<div class="flex items-center"><div class="w-8 h-8 rounded-full border-2 ' + (selected==='A'?'bg-blue-500 border-blue-500':'border-gray-300') + ' flex items-center justify-center text-white font-bold mr-4 option-indicator" id="indA">A</div>';
    html += '<div class="text-gray-700 font-medium">' + optAText + '</div></div></div>';

    html += '<div class="option-card p-5 border-2 rounded-xl ' + (selected==='B'?'selected border-blue-500':'border-gray-200') + '" onclick="selectAnswer(\'B\')">';
    html += '<div class="flex items-center"><div class="w-8 h-8 rounded-full border-2 ' + (selected==='B'?'bg-blue-500 border-blue-500':'border-gray-300') + ' flex items-center justify-center text-white font-bold mr-4 option-indicator" id="indB">B</div>';
    html += '<div class="text-gray-700 font-medium">' + optBText + '</div></div></div>';

    html += '</div></div>';

    document.getElementById('questionContainer').innerHTML = html;
    document.getElementById('currentQ').textContent = idx + 1;
    document.getElementById('progressPct').textContent = Math.round((idx / 60) * 100);
    document.getElementById('progressBar').style.width = (idx / 60 * 100) + '%';

    document.getElementById('prevBtn').classList.toggle('hidden', idx === 0);
    document.getElementById('nextBtn').classList.toggle('hidden', idx === 59);
    document.getElementById('submitBtn').classList.toggle('hidden', idx < 59);
}

function selectAnswer(choice) {
    answers[currentQ] = choice;
    var q = questions[currentQ];
    if (currentQ < 15) {
        if (choice === 'A') { scores.E += q.a.valA; scores.I += q.a.valB; }
        else { scores.E += q.a.valB; scores.I += q.a.valA; }
    } else if (currentQ < 30) {
        if (choice === 'A') { scores.S += q.a.valA; scores.N += q.a.valB; }
        else { scores.S += q.a.valB; scores.N += q.a.valA; }
    } else if (currentQ < 45) {
        if (choice === 'A') { scores.T += q.a.valA; scores.F += q.a.valB; }
        else { scores.T += q.a.valB; scores.F += q.a.valA; }
    } else {
        if (choice === 'A') { scores.J += q.a.valA; scores.P += q.a.valB; }
        else { scores.J += q.a.valB; scores.P += q.a.valA; }
    }
    showQuestion(currentQ);
}

function nextQuestion() {
    if (answers[currentQ] === undefined) {
        alert('请选择一个选项');
        return;
    }
    currentQ++;
    showQuestion(currentQ);
}

function prevQuestion() {
    if (currentQ > 0) {
        currentQ--;
        showQuestion(currentQ);
    }
}

function submitTest() {
    if (answers[currentQ] === undefined) {
        alert('请选择一个选项');
        return;
    }
    showResults();
}

function showResults() {
    document.getElementById('testScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');

    var type = (scores.E >= scores.I ? 'E' : 'I') + (scores.S >= scores.N ? 'S' : 'N') + (scores.T >= scores.F ? 'T' : 'F') + (scores.J >= scores.P ? 'J' : 'P');
    var info = typeInfo[type];

    document.getElementById('resultType').textContent = type;
    document.getElementById('resultName').textContent = info.name + ' (' + type + ')';
    document.getElementById('resultSubtitle').textContent = info.desc;

    // 维度卡片
    var dims = [
        {key:'外向',score:scores.E,other:scores.I,sym:'E',otherSym:'I',color:'bg-blue-500'},
        {key:'内向',score:scores.I,other:scores.E,sym:'I',otherSym:'E',color:'bg-indigo-500'},
        {key:'感觉',score:scores.S,other:scores.N,sym:'S',otherSym:'N',color:'bg-green-500'},
        {key:'直觉',score:scores.N,other:scores.S,sym:'N',otherSym:'S',color:'bg-emerald-500'},
        {key:'思考',score:scores.T,other:scores.F,sym:'T',otherSym:'F',color:'bg-orange-500'},
        {key:'情感',score:scores.F,other:scores.T,sym:'F',otherSym:'T',color:'bg-red-500'},
        {key:'判断',score:scores.J,other:scores.P,sym:'J',otherSym:'P',color:'bg-purple-500'},
        {key:'知觉',score:scores.P,other:scores.J,sym:'P',otherSym:'J',color:'bg-pink-500'}
    ];

    var cardsHTML = '';
    dims.forEach(function(d) {
        var pct = Math.round((d.score / (d.score + d.other)) * 100);
        cardsHTML += '<div class="result-card bg-white rounded-xl p-4 shadow-sm border border-gray-100">';
        cardsHTML += '<div class="flex justify-between items-center mb-2"><span class="text-sm font-semibold text-gray-700">' + d.key + '</span><span class="text-lg font-bold ' + d.color.replace('bg-','text-') + '">' + d.sym + '</span></div>';
        cardsHTML += '<div class="w-full bg-gray-200 rounded-full h-2"><div class="' + d.color + ' h-2 rounded-full" style="width:' + pct + '%"></div></div>';
        cardsHTML += '<div class="text-xs text-gray-400 mt-1">' + d.score + ' vs ' + d.other + '</div></div>';
    });
    document.getElementById('resultCards').innerHTML = cardsHTML;

    // 维度说明
    var dimResult = document.getElementById('dimensionResults');
    var dimHTML = '<h3 class="text-xl font-bold text-gray-800 mb-4">📊 维度分析</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
    dimHTML += '<div class="bg-blue-50 rounded-xl p-4"><div class="font-semibold text-blue-700 mb-1">E/I: ' + (scores.E>=scores.I?'外向':'内向') + '</div><p class="text-sm text-gray-600">' + (scores.E>=scores.I?'你从外部世界获得能量':'你从内心世界获得能量') + '</p></div>';
    dimHTML += '<div class="bg-green-50 rounded-xl p-4"><div class="font-semibold text-green-700 mb-1">S/N: ' + (scores.S>=scores.N?'感觉':'直觉') + '</div><p class="text-sm text-gray-600">' + (scores.S>=scores.N?'你关注具体事实和细节':'你关注整体模式和可能性') + '</p></div>';
    dimHTML += '<div class="bg-orange-50 rounded-xl p-4"><div class="font-semibold text-orange-700 mb-1">T/F: ' + (scores.T>=scores.F?'思考':'情感') + '</div><p class="text-sm text-gray-600">' + (scores.T>=scores.F?'你基于逻辑做决定':'你基于价值观和情感做决定') + '</p></div>';
    dimHTML += '<div class="bg-purple-50 rounded-xl p-4"><div class="font-semibold text-purple-700 mb-1">J/P: ' + (scores.J>=scores.P?'判断':'知觉') + '</div><p class="text-sm text-gray-600">' + (scores.J>=scores.P?'你偏好结构和计划':'你偏好灵活和即兴') + '</p></div>';
    dimHTML += '</div>';
    dimResult.innerHTML = dimHTML;

    // 类型描述
    var typeDesc = document.getElementById('typeDescription');
    var strengthsHTML = info.strengths.map(function(s){return '<span class="bg-gray-100 px-3 py-1 rounded-full text-sm text-gray-700">' + s + '</span>';}).join(' ');
    var careersHTML = info.careers.map(function(c){return '<span class="bg-blue-50 px-3 py-1 rounded-full text-sm text-blue-700">' + c + '</span>';}).join(' ');
    typeDesc.innerHTML = '<h3 class="text-xl font-bold text-gray-800 mb-4">🧠 ' + type + ' 详细分析</h3><p class="text-gray-600 leading-relaxed mb-6">' + info.desc + '</p><div class="mb-4"><div class="font-semibold text-gray-700 mb-2">核心优势</div><div class="flex flex-wrap gap-2">' + strengthsHTML + '</div></div><div><div class="font-semibold text-gray-700 mb-2">适合职业</div><div class="flex flex-wrap gap-2">' + careersHTML + '</div></div>';

    // 发展建议
    var careerAdvice = document.getElementById('careerAdvice');
    careerAdvice.innerHTML = '<h3 class="text-xl font-bold text-gray-800 mb-4">💼 发展建议</h3><ul class="space-y-3 text-gray-600">' +
        '<li class="flex items-start"><span class="text-blue-500 mr-2">•</span><span>在你的团队中发挥' + type + '类型的优势</span></li>' +
        '<li class="flex items-start"><span class="text-blue-500 mr-2">•</span><span>了解自身的潜在弱点并加以改进</span></li>' +
        '<li class="flex items-start"><span class="text-blue-500 mr-2">•</span><span>寻找与你人格类型相匹配的工作环境</span></li>' +
        '</ul>';

    window.scrollTo({top:0,behavior:'smooth'});
}

function retakeTest() {
    currentQ = 0;
    answers = {};
    scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
    window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>

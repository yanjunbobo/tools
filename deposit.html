<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-zh="计度AI工具箱 - 存款利息计算器" data-en="JIDU AI Tools - Deposit Interest Calculator"></title>
    <meta name="description" data-zh="在线存款利息计算器，支持活期和定期存款计算" data-en="Online deposit interest calculator supporting demand and time deposits">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }
        h1 {
            font-size: 20px;
            color: #333;
        }
        #langToggle {
            background: #667eea;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        #langToggle:hover {
            background: #5a6fd6;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button.calculate-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button.calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e1e1e1;
        }
        .result-item:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 18px;
            color: #667eea;
        }
        .result-item span:first-child {
            color: #666;
        }
        .result-item span:last-child {
            color: #333;
        }
        .rate-info {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        [data-en]{display:none}
        html[lang=en] [data-zh]{display:none}
        html[lang=en] [data-en]{display:inline}
        html[lang=en] .result-item span:first-child:empty{display:none}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <p class="breadcrumb"><a href="index.html"><span data-zh>首页</span><span data-en>Home</span></a> &gt; <span data-zh>存款利息计算器</span><span data-en>Deposit Calculator</span></p>
    <h1>
                <span data-zh="存款利息计算器</span>
                <span data-en>Deposit Interest Calculator</span>
            </h1>
            <button id="langToggle" onclick="toggleLang()">EN</button>
        </header>

        <div class="form-group">
            <label>
                <span data-zh="存款金额（元）</span>
                <span data-en>Principal (CNY)</span>
            </label>
            <input type="number" id="principal" placeholder="10000" min="0" step="100">
        </div>

        <div class="form-group">
            <label>
                <span data-zh="存款类型</span>
                <span data-en>Deposit Type</span>
            </label>
            <select id="depositType" onchange="updateTerms()">
                <option value="demand">
                    <span data-zh>活期存款</span>
                    <span data-en>Demand Deposit</span>
                </option>
                <option value="time3m">
                    <span data-zh>定期3个月</span>
                    <span data-en>Time Deposit 3M</span>
                </option>
                <option value="time6m">
                    <span data-zh>定期6个月</span>
                    <span data-en>Time Deposit 6M</span>
                </option>
                <option value="time1y">
                    <span data-zh>定期1年</span>
                    <span data-en>Time Deposit 1Y</span>
                </option>
                <option value="time2y">
                    <span data-zh>定期2年</span>
                    <span data-en>Time Deposit 2Y</span>
                </option>
                <option value="time3y">
                    <span data-zh>定期3年</span>
                    <span data-en>Time Deposit 3Y</span>
                </option>
                <option value="time5y">
                    <span data-zh>定期5年</span>
                    <span data-en>Time Deposit 5Y</span>
                </option>
            </select>
        </div>

        <div class="form-group" id="termGroup">
            <label>
                <span data-zh="存款期限</span>
                <span data-en>Term</span>
            </label>
            <select id="term">
                <option value="custom">
                    <span data-zh>自定义天数</span>
                    <span data-en>Custom Days</span>
                </option>
                <option value="30">30 <span data-zh>天</span><span data-en>Days</span></option>
                <option value="90">90 <span data-zh>天</span><span data-en>Days</span></option>
                <option value="180">180 <span data-zh>天</span><span data-en>Days</span></option>
                <option value="365" selected>1 <span data-zh>年</span><span data-en>Year</span></option>
            </select>
        </div>

        <div class="form-group" id="customTermGroup" style="display:none;">
            <label>
                <span data-zh="自定义期限（天）</span>
                <span data-en>Custom Term (Days)</span>
            </label>
            <input type="number" id="customTerm" value="365" min="1">
        </div>

        <div class="form-group">
            <label>
                <span data-zh="年利率（%）</span>
                <span data-en>Annual Interest Rate (%)</span>
            </label>
            <input type="number" id="rate" step="0.001" placeholder="1.5">
            <div class="rate-info">
                <span data-zh>2026年基准利率：活期0.72%，3个月1.35%，6个月1.55%，1年1.65%，2年2.05%，3年2.45%，5年2.5%</span>
                <span data-en>2026 Base Rates: Demand 0.72%, 3M 1.35%, 6M 1.55%, 1Y 1.65%, 2Y 2.05%, 3Y 2.45%, 5Y 2.5%</span>
            </div>
        </div>

        <button class="calculate-btn" onclick="calculate()">
            <span data-zh>计算利息</span>
            <span data-en>Calculate Interest</span>
        </button>

        <div class="result" id="result">
            <div class="result-item">
                <span>
                    <span data-zh>存款金额</span>
                    <span data-en>Principal</span>
                </span>
                <span id="resPrincipal">¥0</span>
            </div>
            <div class="result-item">
                <span>
                    <span data-zh>存款类型</span>
                    <span data-en>Deposit Type</span>
                </span>
                <span id="resType">-</span>
            </div>
            <div class="result-item">
                <span>
                    <span data-zh>存款期限</span>
                    <span data-en>Term</span>
                </span>
                <span id="resTerm">-</span>
            </div>
            <div class="result-item">
                <span>
                    <span data-zh>年利率</span>
                    <span data-en>Annual Rate</span>
                </span>
                <span id="resRate">0%</span>
            </div>
            <div class="result-item">
                <span>
                    <span data-zh>利息总额</span>
                    <span data-en>Total Interest</span>
                </span>
                <span id="resInterest">¥0</span>
            </div>
            <div class="result-item">
                <span>
                    <span data-zh>本息合计</span>
                    <span data-en>Total Amount</span>
                </span>
                <span id="resTotal">¥0</span>
            </div>
        </div>
    </div>

    <script>
        const BASE_RATES = {
            'demand': 0.72,
            'time3m': 1.35,
            'time6m': 1.55,
            'time1y': 1.65,
            'time2y': 2.05,
            'time3y': 2.45,
            'time5y': 2.5
        };

        const DEPOSIT_NAMES_ZH = {
            'demand': '活期存款',
            'time3m': '定期3个月',
            'time6m': '定期6个月',
            'time1y': '定期1年',
            'time2y': '定期2年',
            'time3y': '定期3年',
            'time5y': '定期5年'
        };

        const DEPOSIT_NAMES_EN = {
            'demand': 'Demand Deposit',
            'time3m': 'Time Deposit 3M',
            'time6m': 'Time Deposit 6M',
            'time1y': 'Time Deposit 1Y',
            'time2y': 'Time Deposit 2Y',
            'time3y': 'Time Deposit 3Y',
            'time5y': 'Time Deposit 5Y'
        };

        function initLang() {
            const savedLang = localStorage.getItem('lang') || 'zh-CN';
            document.documentElement.lang = savedLang;
            updateLangToggle();
        }

        function toggleLang() {
            const html = document.documentElement;
            const currentLang = html.lang;
            const newLang = currentLang === 'zh-CN' ? 'en' : 'zh-CN';
            html.lang = newLang;
            localStorage.setItem('lang', newLang === 'en' ? 'zh-CN' : 'zh-CN');
            updateLangToggle();
        }

        function updateLangToggle() {
            const btn = document.getElementById('langToggle');
            btn.textContent = document.documentElement.lang === 'zh-CN' ? 'EN' : '中文';
        }

        function updateTerms() {
            const type = document.getElementById('depositType').value;
            const termGroup = document.getElementById('termGroup');
            const customGroup = document.getElementById('customTermGroup');
            const termSelect = document.getElementById('term');
            const rateInput = document.getElementById('rate');

            rateInput.value = BASE_RATES[type];

            if (type === 'demand') {
                termGroup.style.display = 'none';
                customGroup.style.display = 'block';
            } else {
                termGroup.style.display = 'block';
                customGroup.style.display = 'none';
                setDefaultTerm(type);
            }
        }

        function setDefaultTerm(type) {
            const termMap = {
                'time3m': '90',
                'time6m': '180',
                'time1y': '365',
                'time2y': '730',
                'time3y': '1095',
                'time5y': '1825'
            };
            document.getElementById('term').value = termMap[type] || '365';
        }

        function calculate() {
            const principal = parseFloat(document.getElementById('principal').value) || 0;
            const type = document.getElementById('depositType').value;
            const rate = parseFloat(document.getElementById('rate').value) / 100 || 0;
            
            let termDays;
            if (type === 'demand') {
                termDays = parseInt(document.getElementById('customTerm').value) || 365;
            } else {
                termDays = parseInt(document.getElementById('term').value) || 365;
            }

            if (principal <= 0) {
                alert(document.documentElement.lang === 'zh-CN' ? '请输入有效存款金额' : 'Please enter a valid principal amount');
                return;
            }

            const interest = principal * rate * (termDays / 365);
            const total = principal + interest;

            const isZh = document.documentElement.lang === 'zh-CN';
            
            document.getElementById('resPrincipal').textContent = '¥' + principal.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('resType').textContent = isZh ? DEPOSIT_NAMES_ZH[type] : DEPOSIT_NAMES_EN[type];
            document.getElementById('resTerm').textContent = termDays + ' ' + (isZh ? '天' : 'Days');
            document.getElementById('resRate').textContent = (rate * 100).toFixed(3) + '%';
            document.getElementById('resInterest').textContent = '¥' + interest.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('resTotal').textContent = '¥' + total.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            document.getElementById('result').classList.add('show');
        }

        window.onload = function() {
            initLang();
            updateTerms();
        };
    </script>
</body>
</html>

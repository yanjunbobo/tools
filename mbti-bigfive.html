<body class="bg-gray-50 min-h-screen">

<script>
var questions = [
    // O - 开放性 (1-10)
    {dim:"O",text:"我想象力丰富，思维活跃",reverse:false},
    {dim:"O",text:"我对艺术和美有深刻的体验和欣赏",reverse:false},
    {dim:"O",text:"我好奇心强，喜欢探索新事物",reverse:false},
    {dim:"O",text:"我喜欢思考抽象的概念和问题",reverse:false},
    {dim:"O",text:"我愿意尝试新的做事方式",reverse:false},
    {dim:"O",text:"我对诗词、文学、艺术有浓厚兴趣",reverse:false},
    {dim:"O",text:"我喜欢哲学性和深层次的讨论",reverse:false},
    {dim:"O",text:"我善于理解复杂抽象的概念",reverse:false},
    {dim:"O",text:"我经常思考人生的意义和目的",reverse:false},
    {dim:"O",text:"我欣赏非传统的价值观和生活方式",reverse:false},

    // C - 尽责性 (11-20)
    {dim:"C",text:"我是一个做事有条理、计划性强的人",reverse:false},
    {dim:"C",text:"我倾向于把事情做完，而不是半途而废",reverse:false},
    {dim:"C",text:"我注重细节，力求把事情做好",reverse:false},
    {dim:"C",text:"我是一个可靠、值得信赖的人",reverse:false},
    {dim:"C",text:"我做事有自律性，能坚持完成任务",reverse:false},
    {dim:"C",text:"我制定计划并严格执行",reverse:false},
    {dim:"C",text:"我在工作/学习中非常细心周到",reverse:false},
    {dim:"C",text:"我会把东西摆放整齐有序",reverse:false},
    {dim:"C",text:"我是一个勤奋努力、任劳任怨的人",reverse:false},
    {dim:"C",text:"我设定目标并努力实现它们",reverse:false},

    // E - 外向性 (21-30)
    {dim:"E",text:"我喜欢成为别人关注的焦点",reverse:false},
    {dim:"E",text:"我在社交场合中很活跃健谈",reverse:false},
    {dim:"E",text:"我喜欢与人交流和互动",reverse:false},
    {dim:"E",text:"我精力充沛，总是充满活力",reverse:false},
    {dim:"E",text:"我喜欢参加聚会和社交活动",reverse:false},
    {dim:"E",text:"我容易与人熟络，主动结识新朋友",reverse:false},
    {dim:"E",text:"我喜欢与人合作而不是独自工作",reverse:false},
    {dim:"E",text:"我乐观开朗，容易感到兴奋和快乐",reverse:false},
    {dim:"E",text:"我喜欢冒险和刺激的活动",reverse:false},
    {dim:"E",text:"我在人群中感到自在和有活力",reverse:false},

    // A - 宜人性 (31-40)
    {dim:"A",text:"我相信人性本善，愿意信任他人",reverse:false},
    {dim:"A",text:"我善于理解他人的感受和立场",reverse:false},
    {dim:"A",text:"我乐于助人，愿意牺牲自己的时间帮助他人",reverse:false},
    {dim:"A",text:"我和大多数人都能相处融洽",reverse:false},
    {dim:"A",text:"我是一个有同情心、善良的人",reverse:false},
    {dim:"A",text:"我愿意为了维护和谐关系而做出让步",reverse:false},
    {dim:"A",text:"我尊重他人的意见和决定",reverse:false},
    {dim:"A",text:"我对人有耐心，愿意倾听",reverse:false},
    {dim:"A",text:"我尽量避免与人发生冲突",reverse:false},
    {dim:"A",text:"我真诚地关心他人的福祉",reverse:false},

    // N - 神经质 (41-50) - reverse scored: high score = low neuroticism
    {dim:"N",text:"我情绪稳定，不容易焦虑或紧张",reverse:true},
    {dim:"N",text:"我能应对压力，不会轻易崩溃",reverse:true},
    {dim:"N",text:"我对自己和生活感到满意",reverse:true},
    {dim:"N",text:"我心绪平静，不容易情绪波动",reverse:true},
    {dim:"N",text:"我自信，有安全感",reverse:true},
    {dim:"N",text:"我很少感到沮丧或抑郁",reverse:true},
    {dim:"N",text:"我心态平和，不易烦恼",reverse:true},
    {dim:"N",text:"我适应能力强，能应对变化",reverse:true},
    {dim:"N",text:"我放松自信，不易被批评困扰",reverse:true},
    {dim:"N",text:"我情绪成熟稳定",reverse:true}
];

var dimensionInfo = {
    O:{
        name:"开放性",
        nameFull:"开放性 (Openness)",
        icon:"🎨",
        desc:"反映你对新经验、新观念的开放程度，包括想象力、审美、好奇心和创造力。高开放性者思维活跃、富有创造力。",
        low:"务实、传统、脚踏实地",
        high:"富有想象力、好奇心强、思维开放"
    },
    C:{
        name:"尽责性",
        nameFull:"尽责性 (Conscientiousness)",
        icon:"📋",
        desc:"反映你的自律性、责任感和条理性。高尽责性者做事有计划、可靠、有毅力。",
        low:"随性、灵活、适应性强",
        high:"有责任心、自律、有条理"
    },
    E:{
        name:"外向性",
        nameFull:"外向性 (Extraversion)",
        icon:"💬",
        desc:"反映你与外部世界的互动方式。高外向者喜欢社交、充满活力、喜欢刺激。",
        low:"内向、安静、享受独处",
        high:"外向、活跃、喜欢社交"
    },
    A:{
        name:"宜人性",
        nameFull:"宜人性 (Agreeableness)",
        icon:"❤️",
        desc:"反映你与他人的相处方式。高宜人性者信任他人、有同情心、乐于合作。",
        low:"竞争性强、质疑他人、理性",
        high:"信任他人、有同情心、合作"
    },
    N:{
        name:"神经质",
        nameFull:"神经质/情绪稳定性 (Neuroticism)",
        icon:"🧘",
        desc:"反映你的情绪稳定性和抗压能力。低神经质者情绪稳定、能应对压力。",
        low:"情绪稳定、适应良好、心态平和",
        high:"情绪波动大、容易焦虑、敏感"
    }
};

var currentQ = 0;
var answers = {};
var scores = {O:0,C:0,E:0,A:0,N:0};
var scaleLabels = ["非常不同意","不同意","中立","同意","非常同意"];

function startTest() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('testScreen').classList.remove('hidden');
    showQuestion(0);
}

function showQuestion(idx) {
    var q = questions[idx];
    var qText = q.text;
    var selected = answers[idx] !== undefined ? answers[idx] : -1;

    var html = '<div class="bg-white rounded-2xl p-8 shadow-lg">';
    html += '<h2 class="text-xl font-semibold text-gray-800 mb-8 text-center">' + (idx+1) + '. ' + qText + '</h2>';
    html += '<div class="flex justify-between items-center gap-2">';

    for (var i = 0; i < 5; i++) {
        var score = i + 1;
        html += '<div class="scale-option flex-1 text-center p-4 border-2 rounded-xl ' + (selected === score ? 'selected border-green-500 bg-green-500 text-white' : 'border-gray-200 hover:border-green-300') + '" onclick="selectAnswer(' + score + ')">';
        html += '<div class="text-2xl mb-1">' + ['1','2','3','4','5'][i] + '</div>';
        html += '<div class="text-xs">' + scaleLabels[i] + '</div></div>';
    }

    html += '</div></div>';
    document.getElementById('questionContainer').innerHTML = html;
    document.getElementById('currentQ').textContent = idx + 1;
    document.getElementById('progressPct').textContent = Math.round((idx / 50) * 100);
    document.getElementById('progressBar').style.width = (idx / 50 * 100) + '%';

    document.getElementById('prevBtn').classList.toggle('hidden', idx === 0);
    document.getElementById('nextBtn').classList.toggle('hidden', idx === 49);
    document.getElementById('submitBtn').classList.toggle('hidden', idx < 49);
}

function selectAnswer(score) {
    answers[currentQ] = score;
    var q = questions[currentQ];
    var rawScore = q.reverse ? (6 - score) : score;
    scores[q.dim] += rawScore;
    showQuestion(currentQ);
}

function nextQuestion() {
    if (answers[currentQ] === undefined) {
        alert('请选择一个选项');
        return;
    }
    currentQ++;
    showQuestion(currentQ);
}

function prevQuestion() {
    if (currentQ > 0) {
        var prevQ = questions[currentQ - 1];
        if (answers[currentQ - 1] !== undefined) {
            var prevRaw = answers[currentQ - 1];
            var prevScore = prevQ.reverse ? (6 - prevRaw) : prevRaw;
            scores[prevQ.dim] -= prevScore;
        }
        currentQ--;
        showQuestion(currentQ);
    }
}

function submitTest() {
    if (answers[currentQ] === undefined) {
        alert('请选择一个选项');
        return;
    }
    showResults();
}

function showResults() {
    document.getElementById('testScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');

    var dims = ['O','C','E','A','N'];
    var maxScore = {O:50, C:50, E:50, A:50, N:50};
    var minScore = {O:10, C:10, E:10, A:10, N:10};

    var resultHTML = '';
    dims.forEach(function(d) {
        var raw = scores[d];
        var pct = Math.round(((raw - minScore[d]) / (maxScore[d] - minScore[d])) * 100);
        var info = dimensionInfo[d];
        var level = pct >= 70 ? 'high' : (pct <= 40 ? 'low' : 'mid');
        var levelText = level === 'high' ? info.high : (level === 'low' ? info.low : '中等');

        var colorMap = {O:'green',C:'blue',E:'orange',A:'pink',N:'purple'};
        var color = colorMap[d];

        resultHTML += '<div class="result-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">';
        resultHTML += '<div class="flex items-center justify-between mb-3">';
        resultHTML += '<div class="flex items-center"><span class="text-2xl mr-3">' + info.icon + '</span><span class="font-bold text-gray-700">' + info.nameFull + '</span></div>';
        resultHTML += '<span class="text-sm px-3 py-1 rounded-full bg-' + color + '-100 text-' + color + '-700 font-semibold">' + pct + '%</span></div>';
        resultHTML += '<div class="w-full bg-gray-200 rounded-full h-3 mb-2"><div class="bg-gradient-to-r from-' + color + '-400 to-' + color + '-600 h-3 rounded-full" style="width:' + pct + '%"></div></div>';
        resultHTML += '<div class="flex justify-between text-xs text-gray-400 mb-2"><span>' + raw + '/50</span><span>' + levelText + '</span></div>';
        resultHTML += '<p class="text-sm text-gray-600">' + info.desc + '</p></div>';
    });
    document.getElementById('dimensionResults').innerHTML = resultHTML;

    // Overall profile
    var profile = '';
    var traits = [];
    if (scores.O >= 35) traits.push('开放思维');
    if (scores.C >= 35) traits.push('尽职尽责');
    if (scores.E >= 35) traits.push('外向活泼');
    if (scores.A >= 35) traits.push('和善友好');
    if (scores.N >= 35) traits.push('情绪稳定');
    if (scores.O < 35) traits.push('务实稳健');
    if (scores.C < 35) traits.push('灵活适应');
    if (scores.E < 35) traits.push('内敛沉静');
    if (scores.A < 35) traits.push('独立理性');
    if (scores.N < 35) traits.push('敏感细腻');

    var traitsHTML = traits.map(function(t){return '<span class="bg-gray-100 px-3 py-1 rounded-full text-sm text-gray-700">' + t + '</span>';}).join(' ');
    profile += '<h3 class="text-xl font-bold text-gray-800 mb-4">📊 你的性格特质</h3>';
    profile += '<div class="flex flex-wrap gap-2 mb-4">' + traitsHTML + '</div>';
    profile += '<p class="text-gray-600 text-sm">你的大五人格特质谱系显示你在多个维度上的自然倾向。这些特质影响你如何与他人互动、应对挑战、追求目标。</p>';
    document.getElementById('overallProfile').innerHTML = profile;

    // Trait descriptions
    var traitDescHTML = '<h3 class="text-xl font-bold text-gray-800 mb-4">🧠 各维度详细分析</h3><div class="space-y-4 text-gray-600">';

    dims.forEach(function(d) {
        var info = dimensionInfo[d];
        var raw = scores[d];
        var pct = Math.round(((raw - minScore[d]) / (maxScore[d] - minScore[d])) * 100);
        var level = pct >= 70 ? 'high' : (pct <= 40 ? 'low' : 'mid');
        var levelDesc = level === 'high' ? (d==='N'?info.high:info.high) : (level === 'low' ? (d==='N'?info.low:info.low) : '中等程度的'+info.name+'特质');

        var colorMap = {O:'green',C:'blue',E:'orange',A:'pink',N:'purple'};
        var color = colorMap[d];
        traitDescHTML += '<div class="bg-' + color + '-50 rounded-xl p-4"><div class="font-semibold text-' + color + '-700 mb-1">' + info.icon + ' ' + info.nameFull + '</div><p class="text-sm">' + levelDesc + '</p></div>';
    });

    traitDescHTML += '</div>';
    document.getElementById('traitDescription').innerHTML = traitDescHTML;

    window.scrollTo({top:0,behavior:'smooth'});
}

function retakeTest() {
    currentQ = 0;
    answers = {};
    scores = {O:0,C:0,E:0,A:0,N:0};
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
    window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>

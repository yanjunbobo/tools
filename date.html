<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日期计算器 - 天数计算工作日统计倒计时</title>
    <meta name="description" content="在线日期计算器，支持天数计算、工作日统计、中国法定节假日、倒计时功能，农历节日查询。">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', 'PingFang SC', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm">
        <nav class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="/" class="text-2xl font-bold text-blue-600">🧮 计算器之家</a>
            <div class="hidden md:flex gap-6 text-gray-600">
                <a href="/" class="hover:text-blue-600">首页</a>
                <a href="/#tools" class="hover:text-blue-600">工具</a>
            </div>
        </nav>
    </header>

    <div class="max-w-4xl mx-auto px-4 py-3 text-sm text-gray-500">
        <a href="/" class="hover:text-blue-600">首页</a> > <span class="text-gray-700">日期计算器</span>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">📅 日期/工作日计算器</h1>
        <p class="text-gray-500 mb-6">天数计算、工作日统计、倒计时</p>

        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="mode" value="days" checked class="w-4 h-4 text-blue-600" onchange="toggleMode()">
                            <span>天数计算</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="mode" value="countdown" class="w-4 h-4 text-blue-600" onchange="toggleMode()">
                            <span>倒计时</span>
                        </label>
                    </div>
                    <div id="daysMode">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">开始日期</label>
                                <input type="date" id="startDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" onchange="calculate()">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">结束日期</label>
                                <input type="date" id="endDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" onchange="calculate()">
                            </div>
                        </div>
                        <div class="mt-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="excludeWeekend" class="w-4 h-4 text-blue-600" onchange="calculate()">
                                <span>排除周末</span>
                            </label>
                        </div>
                    </div>
                    <div id="countdownMode" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-2">目标日期</label>
                        <input type="date" id="targetDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" onchange="calculate()">
                    </div>
                </div>
                <div class="bg-blue-50 rounded-xl p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">📊 计算结果</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center py-2 border-b border-blue-100">
                            <span class="text-gray-600">自然天数</span>
                            <span id="totalDays" class="text-xl font-semibold text-gray-800">-</span>
                        </div>
                        <div class="flex justify-between items-center py-2 border-b border-blue-100">
                            <span class="text-gray-600">工作日</span>
                            <span id="workDays" class="text-xl font-semibold text-blue-600">-</span>
                        </div>
                        <div class="flex justify-between items-center py-2 border-b border-blue-100">
                            <span class="text-gray-600">周末天数</span>
                            <span id="weekendDays" class="text-xl font-semibold text-orange-500">-</span>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-gray-600">剩余天数</span>
                            <span id="remainingDays" class="text-2xl font-bold text-green-600">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">🎯 常用节日倒计时</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="holidayCountdown"></div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">关于日期计算器</h2>
            <p class="text-gray-600 mb-3">日期计算器可以帮助您计算两个日期之间的天数差、工作日天数，以及距离重要节日的倒计时。</p>
            <p class="text-gray-600"><strong>2024-2025年法定节假日：</strong>元旦（1天）、春节（3天）、清明节（1天）、劳动节（1天）、端午节（1天）、中秋节（1天）、国庆节（3天）。</p>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-6 mt-8 text-center">
        <p>© 2024 计算器之家</p>
    </footer>

    <script>
        // 2024-2025法定节假日
        const HOLIDAYS = [
            { name: '元旦', date: '2025-01-01', days: 1 },
            { name: '春节', date: '2025-01-28', days: 3 },
            { name: '清明节', date: '2025-04-04', days: 1 },
            { name: '劳动节', date: '2025-05-01', days: 1 },
            { name: '端午节', date: '2025-05-31', days: 1 },
            { name: '中秋节', date: '2025-10-06', days: 1 },
            { name: '国庆节', date: '2025-10-01', days: 3 }
        ];

        function toggleMode() {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            document.getElementById('daysMode').classList.toggle('hidden', mode !== 'days');
            document.getElementById('countdownMode').classList.toggle('hidden', mode !== 'countdown');
            calculate();
        }

        function calculate() {
            const mode = document.querySelector('input[name="mode"]:checked').value;

            if (mode === 'days') {
                const start = new Date(document.getElementById('startDate').value);
                const end = new Date(document.getElementById('endDate').value);
                const excludeWeekend = document.getElementById('excludeWeekend').checked;

                if (isNaN(start) || isNaN(end) || start > end) {
                    document.getElementById('totalDays').textContent = '-';
                    document.getElementById('workDays').textContent = '-';
                    document.getElementById('weekendDays').textContent = '-';
                    document.getElementById('remainingDays').textContent = '-';
                    return;
                }

                const totalDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                let workDays = 0, weekendDays = 0;

                for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                    const dayOfWeek = d.getDay();
                    if (dayOfWeek === 0 || dayOfWeek === 6) weekendDays++;
                    else workDays++;
                }

                document.getElementById('totalDays').textContent = totalDays + '天';
                document.getElementById('workDays').textContent = excludeWeekend ? workDays + '天' : '-';
                document.getElementById('weekendDays').textContent = excludeWeekend ? weekendDays + '天' : '-';

                const today = new Date();
                today.setHours(0,0,0,0);
                const remaining = Math.ceil((start - today) / (1000 * 60 * 60 * 24));
                document.getElementById('remainingDays').textContent = remaining > 0 ? '距开始还有' + remaining + '天' : (remaining === 0 ? '今天' : '已过');
            } else {
                const target = new Date(document.getElementById('targetDate').value);
                if (isNaN(target)) return;
                const today = new Date();
                today.setHours(0,0,0,0);
                const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                document.getElementById('totalDays').textContent = '-';
                document.getElementById('workDays').textContent = '-';
                document.getElementById('weekendDays').textContent = '-';
                document.getElementById('remainingDays').textContent = diff > 0 ? '还有' + diff + '天' : (diff === 0 ? '今天' : '已过' + Math.abs(diff) + '天');
            }
        }

        // 显示节日倒计时
        function showHolidays() {
            const container = document.getElementById('holidayCountdown');
            const today = new Date();
            let html = '';
            HOLIDAYS.forEach(h => {
                const target = new Date(h.date);
                const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                const status = diff > 0 ? '还有' + diff + '天' : (diff === 0 ? '今天！' : '已过');
                const color = diff > 30 ? 'bg-blue-50 text-blue-600' : diff > 0 ? 'bg-green-50 text-green-600' : 'bg-gray-100 text-gray-400';
                html += `<div class="p-3 rounded ${color}"><div class="font-semibold">${h.name}</div><div class="text-sm">${status}</div></div>`;
            });
            container.innerHTML = html;
        }

        // 设置默认日期
        const today = new Date();
        const nextMonth = new Date(today);
        nextMonth.setMonth(nextMonth.getMonth() + 1);
        document.getElementById('startDate').valueAsDate = today;
        document.getElementById('endDate').valueAsDate = nextMonth;
        document.getElementById('targetDate').valueAsDate = new Date(today.getFullYear() + 1, 0, 1);

        calculate();
        showHolidays();
    </script>
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"WebApplication","name":"日期计算器","description":"计算天数、工作日、倒计时","url":"https://tools.xxym8.com/date.html","applicationCategory":"UtilityApplication","offers":{"@type":"Offer","price":"0","priceCurrency":"CNY"}}
    </script>
</body>
</html>

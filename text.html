<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字数统计 & 正则测试</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 1.5rem; }
        
        .panel { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .panel-title { font-size: 1rem; font-weight: 600; color: #444; margin-bottom: 12px; }
        
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; resize: vertical; line-height: 1.6; }
        textarea:focus { outline: none; border-color: #4a90d9; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 12px; }
        .stat-item { background: #f8f9fa; padding: 12px; border-radius: 6px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #4a90d9; }
        .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }
        
        .regex-input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: 'Consolas', monospace; }
        input[type="text"]:focus { outline: none; border-color: #4a90d9; }
        .btn { padding: 10px 20px; background: #4a90d9; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #3a7bc8; }
        
        .result-box { background: #f8f9fa; border-radius: 6px; padding: 15px; min-height: 60px; font-size: 14px; line-height: 1.8; word-break: break-all; }
        .match { background: #ffe066; padding: 1px 2px; border-radius: 2px; }
        .error { color: #e74c3c; font-size: 13px; margin-top: 8px; }
        .match-info { color: #888; font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <p class="breadcrumb"><a href="index.html"><span data-zh>首页</span><span data-en>Home</span></a> &gt; <span data-zh>文本工具箱</span><span data-en>Text Tools</span></p>
    <h1>📝 字数统计 & 正则测试</h1>
        
        <!-- 字数统计 -->
        <div class="panel">
            <div class="panel-title">文本内容</div>
            <textarea id="textInput" placeholder="在此输入文本..."></textarea>
            <div class="stats">
                <div class="stat-item"><div class="stat-value" id="cnCount">0</div><div class="stat-label">中文</div></div>
                <div class="stat-item"><div class="stat-value" id="enCount">0</div><div class="stat-label">英文</div></div>
                <div class="stat-item"><div class="stat-value" id="charCount">0</div><div class="stat-label">字符</div></div>
                <div class="stat-item"><div class="stat-value" id="paraCount">0</div><div class="stat-label">段落</div></div>
            </div>
        </div>
        
        <!-- 正则测试 -->
        <div class="panel">
            <div class="panel-title">正则表达式测试</div>
            <div class="regex-input-group">
                <input type="text" id="regexInput" placeholder="输入正则表达式，如：\w+、\d+、[\u4e00-\u9fa5]+">
                <button class="btn" onclick="testRegex()">测试</button>
            </div>
            <div class="result-box" id="resultBox"></div>
            <div class="error" id="errorMsg"></div>
            <div class="match-info" id="matchInfo"></div>
        </div>
    </div>
    
    <script>
        const textInput = document.getElementById('textInput');
        const regexInput = document.getElementById('regexInput');
        const resultBox = document.getElementById('resultBox');
        const errorMsg = document.getElementById('errorMsg');
        const matchInfo = document.getElementById('matchInfo');
        
        function countStats() {
            const text = textInput.value;
            
            // 中文字符
            const cnChars = text.match(/[\u4e00-\u9fa5]/g) || [];
            // 英文字母
            const enChars = text.match(/[a-zA-Z]/g) || [];
            // 总字符数（不含空格换行）
            const totalChars = text.replace(/\s/g, '').length;
            // 段落数
            const paras = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
            const paraCount = paras.length > 0 ? paras.length : (text.trim() ? 1 : 0);
            
            document.getElementById('cnCount').textContent = cnChars.length;
            document.getElementById('enCount').textContent = enChars.length;
            document.getElementById('charCount').textContent = totalChars;
            document.getElementById('paraCount').textContent = paraCount;
        }
        
        function testRegex() {
            const text = textInput.value;
            const pattern = regexInput.value;
            errorMsg.textContent = '';
            matchInfo.textContent = '';
            
            if (!pattern) {
                resultBox.innerHTML = text || '<span style="color:#888">无文本</span>';
                return;
            }
            
            try {
                const regex = new RegExp(pattern, 'g');
                let match;
                let count = 0;
                let lastIndex = 0;
                let html = '';
                
                // 简单高亮实现
                const matches = [...text.matchAll(regex)];
                count = matches.length;
                
                if (count === 0) {
                    resultBox.innerHTML = text || '<span style="color:#888">无匹配</span>';
                    matchInfo.textContent = '无匹配';
                } else {
                    let pos = 0;
                    for (const m of matches) {
                        html += escapeHtml(text.slice(pos, m.index));
                        html += '<span class="match">' + escapeHtml(m[0]) + '</span>';
                        pos = m.index + m[0].length;
                    }
                    html += escapeHtml(text.slice(pos));
                    resultBox.innerHTML = html;
                    matchInfo.textContent = `找到 ${count} 个匹配`;
                }
            } catch (e) {
                errorMsg.textContent = '正则错误: ' + e.message;
                resultBox.innerHTML = text;
            }
        }
        
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }
        
        // 实时更新
        textInput.addEventListener('input', () => {
            countStats();
            testRegex();
        });
        regexInput.addEventListener('input', testRegex);
        
        // 初始化
        countStats();
    </script>
</body>
</html>
